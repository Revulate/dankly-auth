<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Echo — Signing in…</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font: -apple-system-body, system-ui, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; padding: 1.5rem; text-align: center; gap: 1rem;
    }
    a.button {
      display: inline-block; padding: 0.75rem 1.25rem; border-radius: 0.75rem;
      background: #9147ff; color: #fff; text-decoration: none; font-weight: 600;
    }
    p { opacity: 0.7; }
  </style>
</head>
<body>
  <h2>Echo</h2>
  <p id="msg">Signing you in…</p>
  <a id="link" class="button" href="#" style="display:none">Open Echo</a>

  <script>
    // Twitch's implicit-grant flow returns the access token in the URL *fragment*
    // (after the '#'). Fragments are never sent to a server, so this page only
    // ever sees the token client-side and immediately hands it to the app's
    // custom URL scheme. Nothing is stored, logged, or transmitted anywhere.
    (function () {
      // Collect the OAuth params from the fragment (where Twitch puts them) and,
      // defensively, the query string too.
      var params = (window.location.hash || "").replace(/^#/, "");
      var query = (window.location.search || "").replace(/^\?/, "");
      if (query) { params = params ? (params + "&" + query) : query; }

      // Forward to the app as a *query* string (echo://auth?<params>). A query
      // survives a custom-scheme redirect more reliably than a fragment, and the
      // app's parseCallback reads either. ASWebAuthenticationSession captures the
      // echo:// callback via its callbackURLScheme.
      var target = "echo://auth" + (params ? "?" + params : "");

      var link = document.getElementById("link");
      var msg = document.getElementById("msg");
      link.href = target;

      // Hand off to the app immediately.
      window.location.replace(target);

      // iOS may block an automatic navigation to a custom scheme without a user
      // gesture, so always surface a prominent tap-through fallback shortly after.
      setTimeout(function () {
        msg.textContent = "Almost there — tap to return to Echo:";
        link.style.display = "inline-block";
      }, 600);
    })();
  </script>
</body>
</html>
